name: Windows Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Windows kcat.zip
    runs-on: windows-2022

    env:
      CONFIGURATION: Release
      PLATFORM: x64
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '[17.0,18.0)'

      - name: Set up NuGet
        uses: NuGet/setup-nuget@v2

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          if ('${{ github.ref_type }}' -eq 'tag' -and '${{ github.ref_name }}' -match '^v?(.+)$') {
            $version = $Matches[1]
          } else {
            $version = "0.0.0-ci.${{ github.run_number }}"
          }

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "zip_name=kcat-$version-windows-$env:PLATFORM.zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Restore NuGet packages
        shell: pwsh
        run: nuget restore win32\kcat.sln -PackagesDirectory win32\packages

      - name: Build kcat for Windows
        shell: pwsh
        run: |
          msbuild win32\kcat.sln `
            /m `
            /p:Configuration=$env:CONFIGURATION `
            /p:Platform=$env:PLATFORM `
            /p:PlatformToolset=v143 `
            /p:PreferredToolArchitecture=x64

      - name: Stage payload
        shell: pwsh
        run: |
          $stage = Join-Path $env:GITHUB_WORKSPACE 'artifacts\stage'
          New-Item -ItemType Directory -Path $stage -Force | Out-Null

          $exe = Get-ChildItem -Path (Join-Path $env:GITHUB_WORKSPACE 'win32') -Filter 'kcat.exe' -Recurse |
            Where-Object { $_.FullName -match "\\$env:CONFIGURATION\\" } |
            Select-Object -First 1
          if (-not $exe) {
            throw "Could not find kcat.exe under win32 after the MSBuild step."
          }

          Copy-Item -Path (Join-Path $exe.DirectoryName '*') -Destination $stage -Recurse -Force
          Copy-Item -Path README.md,LICENSE -Destination $stage -Force

          Get-ChildItem -Path (Join-Path $env:GITHUB_WORKSPACE 'win32\packages') -Filter '*.dll' -Recurse |
            Where-Object { $_.FullName -match '(win-x64|x64)' } |
            ForEach-Object {
              $destination = Join-Path $stage $_.Name
              if (-not (Test-Path $destination)) {
                Copy-Item -Path $_.FullName -Destination $destination -Force
              }
            }

          Get-ChildItem -Path $stage -File | Sort-Object Name,Length

      - name: Create kcat.zip
        shell: pwsh
        run: |
          $stage = Join-Path $env:GITHUB_WORKSPACE 'artifacts\stage'
          $zip = Join-Path $env:GITHUB_WORKSPACE "artifacts\${{ steps.version.outputs.zip_name }}"
          Compress-Archive -Path (Join-Path $stage '*') -DestinationPath $zip -Force
          Get-Item $zip

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: kcat-windows-${{ steps.version.outputs.version }}
          path: artifacts/${{ steps.version.outputs.zip_name }}

      - name: Publish kcat.zip to GitHub Release
        if: ${{ github.ref_type == 'tag' }}
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/${{ steps.version.outputs.zip_name }}
